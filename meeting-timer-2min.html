<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMO Summit 2026 Half — Meeting Timer (2分固定)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f8fafc;
    color: #1e293b;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  #flash-overlay {
    position: fixed; inset: 0; pointer-events: none;
    z-index: 100; opacity: 0; transition: opacity 0.08s;
  }
  @keyframes shake-once {
    0%,100%{transform:translateX(0)}
    15%{transform:translateX(-14px) rotate(-1.2deg)}
    30%{transform:translateX(14px) rotate(1.2deg)}
    45%{transform:translateX(-9px)}
    60%{transform:translateX(9px)}
    75%{transform:translateX(-5px)}
    90%{transform:translateX(5px)}
  }
  @keyframes shake-continuous {
    0%   { transform: translateX(0) rotate(0deg); }
    8%   { transform: translateX(-13px) rotate(-1.3deg); }
    16%  { transform: translateX(13px) rotate(1.3deg); }
    24%  { transform: translateX(-9px) rotate(-.9deg); }
    32%  { transform: translateX(9px) rotate(.9deg); }
    40%  { transform: translateX(-5px); }
    50%  { transform: translateX(5px); }
    60%  { transform: translateX(-2px); }
    70%  { transform: translateX(2px); }
    80%  { transform: translateX(-1px); }
    90%  { transform: translateX(0); }
    100% { transform: translateX(0); }
  }
  @keyframes glow-pulse {
    0%,100%{box-shadow:0 0 0 3px var(--cc),0 4px 24px rgba(0,0,0,.10)}
    50%{box-shadow:0 0 0 8px var(--cc),0 4px 40px rgba(0,0,0,.14)}
  }
  @keyframes bounce-time {
    0%{transform:scale(1)} 40%{transform:scale(1.11)}
    70%{transform:scale(0.97)} 100%{transform:scale(1)}
  }
  @keyframes alarm-pulse {
    0%,100%{transform:scale(1);opacity:1}
    50%{transform:scale(1.04);opacity:.88}
  }
  @keyframes fadeIn {
    from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)}
  }
  .container {
    width: 500px; max-width: 96vw;
    display: flex; flex-direction: column; gap: 16px;
  }
  .logo-header {
    display: flex; justify-content: center;
    align-items: center; padding: 8px 0 4px;
  }
  .logo-header img { height: 38px; max-width: 100%; object-fit: contain; }
  .timer-card {
    background: #fff; border-radius: 20px;
    padding: 28px 28px 22px;
    border: 2.5px solid #e2e8f0;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    --cc: #16a34a; transition: border-color .4s;
    position: relative;
    overflow: hidden;
  }
  .timer-card.glow { animation: glow-pulse 1.1s ease-in-out infinite; border-color: var(--cc); }
  .timer-card.shake-once { animation: shake-once .55s ease-out; }
  .timer-card.shake-tick { animation: shake-continuous .55s ease-out forwards; }
  #status-msg {
    text-align: center; font-size: .92rem; font-weight: 700;
    letter-spacing: .07em; min-height: 1.4em;
    color: var(--cc); margin-bottom: 6px; transition: color .4s;
  }
  #time-display {
    text-align: center; font-size: 5.8rem; font-weight: 900;
    font-variant-numeric: tabular-nums; color: var(--cc);
    line-height: 1; letter-spacing: -3px; margin: 4px 0; transition: color .4s;
  }
  #time-display.bounce { animation: bounce-time .32s ease-out; }
  #time-display.alarm  { animation: alarm-pulse .62s ease-in-out infinite; }
  #overtime-display {
    text-align: center; font-size: 1.25rem; font-weight: 800;
    color: #dc2626; min-height: 1.6em; margin-top: 2px;
  }
  .progress-section { margin-top: 14px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: .74rem; color: #64748b;
    margin-bottom: 5px; font-weight: 600;
  }
  #progress-pct { color: var(--cc); transition: color .4s; }
  .progress-bar-bg { height: 9px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
  #progress-bar {
    height: 100%; width: 100%; background: var(--cc);
    border-radius: 99px; transition: width .5s linear, background .4s;
  }
  .controls { display: flex; gap: 11px; justify-content: center; }
  .btn {
    flex: 1; padding: 13px; border-radius: 13px; border: none;
    font-size: .92rem; font-weight: 800; cursor: pointer;
    transition: all .14s; letter-spacing: .04em;
  }
  .btn:active { transform: scale(.96); }
  #btn-start { background: #16a34a; color: #fff; max-width: 200px; }
  #btn-reset  { background: #e2e8f0; color: #475569; max-width: 120px; }
  #btn-reset:hover { background: #cbd5e1; }
  .sound-toggle {
    display: flex; align-items: center; justify-content: center;
    gap: 7px; font-size: .78rem; color: #64748b;
    cursor: pointer; user-select: none; font-weight: 600;
  }
  .sound-toggle input { cursor: pointer; accent-color: #16a34a; }
  #end-overlay {
    position: absolute; inset: 0; background: rgba(255,255,255,.92);
    align-items: center; justify-content: center;
    z-index: 10; display: none; border-radius: 18px;
    backdrop-filter: blur(2px);
  }
  #end-overlay.visible { display: flex; animation: fadeIn .28s ease-out; }
  .end-card {
    text-align: center;
    animation: alarm-pulse .65s ease-in-out infinite;
    padding: 16px;
    width: 100%;
  }
  .end-card h2 { font-size: 2.1rem; font-weight: 900; color: #dc2626; margin-bottom: 8px; }
  .end-card p  { color: #64748b; font-size: .92rem; margin-bottom: 20px; }
  .end-card button {
    padding: 11px 28px; background: #dc2626; border: none;
    border-radius: 10px; color: #fff; font-size: .92rem;
    font-weight: 800; cursor: pointer; transition: opacity .18s;
  }
  .end-card button:hover { opacity: .86; }
</style>
</head>

  <div class="timer-card" id="timer-card">
    <div id="end-overlay">
      <div class="end-card">
        <h2>⏰ 持ち時間終了です</h2>
        <p>超過時間の計測を継続中です。</p>
        <button onclick="dismissEnd()">閉じる</button>
      </div>
    </div>
    <div id="status-msg">スタートで2分計測を開始</div>
    <div id="time-display">02:00</div>
    <div id="overtime-display"></div>
    <div class="progress-section">
      <div class="progress-label">
        <span>残り時間</span>
        <span id="progress-pct">100%</span>
      </div>

  <div class="controls">
    <button class="btn" id="btn-start" onclick="toggleStartPause()">▶ スタート</button>
    <button class="btn" id="btn-reset" onclick="resetTimer()">↺ リセット</button>
  </div>

  <label class="sound-toggle">
    <input type="checkbox" id="sound-chk" checked>
    🔔 フェーズ切替・終了時にアラーム音を鳴らす
  </label>
</div>

<script>
// ===== 2分固定タイマー =====
var FIXED_SEC = 120; // 常に2分固定

var totalSec=FIXED_SEC, remainSec=FIXED_SEC, overtimeSec=0;
var iv=null, running=false, finished=false;
var endShown=false;
var phase='green';
var CC = { green:'#16a34a', orange:'#ea580c', red:'#dc2626' };

function $(id){ return document.getElementById(id); }
var card   = $('timer-card');
var timeDsp= $('time-display');
var statMsg= $('status-msg');
var pBar   = $('progress-bar');
var pPct   = $('progress-pct');
var otDsp  = $('overtime-display');
var flash  = $('flash-overlay');
var btnSt  = $('btn-start');

var actx=null;
function getCtx(){ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); return actx; }

function tone(freq, dur, start, type, vol){
  start=start||0; type=type||'sine'; vol=vol||0.45;
  if(!$('sound-chk').checked) return;
  var c=getCtx(), o=c.createOscillator(), g=c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type=type; o.frequency.value=freq;
  var t=c.currentTime+start;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur+0.05);
}

function chime(type){
  if(type==='orange'){
    [[880,0],[740,0.18],[660,0.36]].forEach(function(p){ tone(p[0],0.20,p[1],'sine',0.55); });
  } else if(type==='red'){
    [0,0.18,0.36].forEach(function(s){
      tone(1174,0.14,s,'square',0.35);
      tone(1174,0.14,s,'sine',0.5);
    });
  }
}

// 残り30・20・10秒の単発ビープ
function beepCountdown(){
  tone(1318,0.12,0,'sine',0.65);
  tone(1318,0.12,0,'triangle',0.3);
}

function alarmEnd(){
  if(!$('sound-chk').checked) return;
  var seq=[523,659,784,1047,1319];
  seq.forEach(function(f,i){
    tone(f,0.16,i*0.16,'sine',0.55);
    tone(f,0.16,i*0.16,'triangle',0.28);
  });
  setTimeout(function(){
    seq.forEach(function(f,i){
      tone(f,0.16,i*0.16,'sine',0.55);
      tone(f,0.16,i*0.16,'triangle',0.28);
    });
  },900);
}

function doFlash(color,n){
  flash.style.background=color;
  var i=0;
  function go(){
    flash.style.opacity='0.5';
    setTimeout(function(){
      flash.style.opacity='0'; i++;
      if(i<n) setTimeout(go,180);
    },110);
  }
  go();
}

// 単発シェイク（色変化など）
function shakeOnce(){
  card.classList.remove('shake-once','shake-continuous');
  void card.offsetWidth;
  card.classList.add('shake-once');
  setTimeout(function(){ card.classList.remove('shake-once'); },660);
}

// 1秒ごとシェイク（残り10秒以下・tick内から毎秒呼ぶ）
function shakeTick(){
  card.classList.remove('shake-tick');
  void card.offsetWidth;
  card.classList.add('shake-tick');
  setTimeout(function(){ card.classList.remove('shake-tick'); }, 600);
}

function stopShake(){
  card.classList.remove('shake-once','shake-tick');
}

function bounce(){
  timeDsp.classList.remove('bounce');
  void timeDsp.offsetWidth;
  timeDsp.classList.add('bounce');
  setTimeout(function(){ timeDsp.classList.remove('bounce'); },380);
}

function setColor(p){
  var c=CC[p]||CC.red;
  card.style.setProperty('--cc',c);
  pBar.style.background=c;
}

function fmt(s){
  var m=Math.floor(Math.abs(s)/60).toString().padStart(2,'0');
  var sc=(Math.abs(s)%60).toString().padStart(2,'0');
  return m+':'+sc;
}

function statusText(){
  if(finished) return '⏰ 持ち時間終了';
  if(!running && remainSec===totalSec) return 'スタートで2分計測を開始';
  if(!running) return '⏸ 一時停止中';
  if(remainSec<=10)  return '🔴 残りわずかです！';
  if(phase==='red')    return '🔴 残りわずかです！';
  if(phase==='orange') return '🟠 そろそろ終了です';
  return '🟢 残りの持ち時間';
}

function render(){
  timeDsp.textContent = fmt(finished ? 0 : remainSec);
  statMsg.textContent = statusText();
  statMsg.style.color  = CC[phase]||CC.red;
  pPct.style.color     = CC[phase]||CC.red;
  var pct = totalSec>0 ? Math.max(0,(remainSec/totalSec)*100) : 0;
  pBar.style.width = pct+'%';
  pPct.textContent = Math.round(pct)+'%';
  otDsp.textContent = (finished && overtimeSec>0) ? '+'+fmt(overtimeSec)+' 超過' : '';
}

function tick(){
  if(!finished){
    remainSec--;
    if(remainSec<0){
      remainSec=0; finished=true; overtimeSec=0;
      setColor('red');
      timeDsp.classList.add('alarm');
      card.classList.add('glow');
      // 連続シェイクは終了演出に引き継ぎ（stopしない）
      alarmEnd();
      doFlash('rgba(220,38,38,.55)',6);
      if(!endShown){ endShown=true; setTimeout(showEnd,350); }
    } else {
      // 色フェーズ切替：2:00〜1:30は緑、1:30〜1:00はオレンジ、1:00以降は赤
      var p = remainSec<=60 ? 'red' : remainSec<=90 ? 'orange' : 'green';
      if(p!==phase){
        phase=p; setColor(p); shakeOnce(); bounce();
        if(p==='orange'){ doFlash('rgba(234,88,12,.42)',3); chime('orange'); }
        if(p==='red')   { doFlash('rgba(220,38,38,.45)',4); chime('red'); }
      }

      // 残り30・20秒：単発シェイク＋ビープ
      if(remainSec===30 || remainSec===20){
        shakeOnce();
        doFlash('rgba(220,38,38,.35)',2);
        beepCountdown();
      }

      // 残り10秒：シェイク開始＋ビープ
      if(remainSec===10){
        shakeTick();
        doFlash('rgba(220,38,38,.4)',3);
        beepCountdown();
      }

      // 残り10秒未満：毎秒シェイク
      if(remainSec < 10){ shakeTick(); }
    }
  } else {
    overtimeSec++;
    shakeTick();
  }
  render();
}

function showEnd(){ $('end-overlay').classList.add('visible'); }
function dismissEnd(){ $('end-overlay').classList.remove('visible'); }

function toggleStartPause(){
  if(!running && remainSec===totalSec && !finished){
    // 新規スタート（初回 or リセット直後）
    finished=false;
    endShown=false;
    phase='green'; setColor('green');
    timeDsp.classList.remove('alarm');
    card.classList.remove('glow');
    stopShake();
  }
  if(running){
    clearInterval(iv); iv=null; running=false;
    btnSt.textContent='▶ 再開'; btnSt.style.background='#ea580c';
  } else {
    running=true;
    btnSt.textContent='⏸ 一時停止'; btnSt.style.background='#64748b';
    iv=setInterval(tick,1000);
  }
  render();
}

function resetTimer(){
  clearInterval(iv); iv=null;
  running=false; finished=false; endShown=false;
  totalSec=FIXED_SEC; remainSec=FIXED_SEC; overtimeSec=0;
  phase='green'; setColor('green');
  timeDsp.classList.remove('alarm');
  card.classList.remove('glow');
  stopShake();
  btnSt.textContent='▶ スタート'; btnSt.style.background='#16a34a';
  $('end-overlay').classList.remove('visible');
  render();
}

render();
</script>
</body>
</html>
